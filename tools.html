<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Free Tools - Kishore Gupta</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #0f172a;
  color: white;
  margin: 0;
}

.container {
  max-width: 900px;
  margin: auto;
  padding: 20px;
  text-align: center;
}

h1 {
  font-size: 36px;
}

.tools-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 20px;
  margin-top: 30px;
}

.card {
  background: #1e293b;
  padding: 20px;
  border-radius: 10px;
}

textarea {
  width: 100%;
  height: 120px;
  margin-top: 10px;
  padding: 10px;
  border-radius: 8px;
  border: none;
}

.result {
  margin-top: 15px;
}

.btn {
  display: inline-block;
  margin-top: 10px;
  padding: 10px 15px;
  background: #2563eb;
  color: white;
  text-decoration: none;
  border-radius: 6px;
}
</style>
</head>

<body>

<div class="container">

  <h1>Free Tools 🔧</h1>
  <p>Simple, fast, and useful tools</p>

  <div class="tools-grid">

    <!-- Word Counter -->
    <div class="card">
      <h2>Word Counter</h2>
      <textarea id="text" placeholder="Type or paste text..."></textarea>

      <div class="result">
        <p>Words: <span id="words">0</span></p>
        <p>Characters: <span id="chars">0</span></p>
      </div>
    </div>

    <!-- Placeholder for next tools -->
    <div class="card">
      <h2>More Tools Coming Soon 🚀</h2>
      <p>Password Generator, Case Converter, and more.</p>
    </div>

  </div>

  <a class="btn" href="/">← Back to Home</a>

</div>

<script>
const textArea = document.getElementById("text");

textArea.addEventListener("input", () => {
  let text = textArea.value;

  let words = text.trim().split(/\s+/).filter(word => word.length > 0);
  document.getElementById("words").innerText = words.length;

  document.getElementById("chars").innerText = text.length;
});
</script>

</body>
</html>
